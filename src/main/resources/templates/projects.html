<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Projects | Hybrid Cloud Client Impact Portal</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">Hybrid Cloud Client Impact Portal</a>
    <nav>
        <a th:href="@{/}">Dashboard</a>
        <a sec:authorize="hasAnyRole('ADMIN','CONSULTANT')" th:href="@{/clients}">Clients</a>
        <a sec:authorize="hasAnyRole('ADMIN','CONSULTANT')" th:href="@{/projects}">Projects</a>
        <a sec:authorize="hasAnyRole('ADMIN','CONSULTANT')" th:href="@{/analytics}">Analytics</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="link-button">Sign out</button>
        </form>
    </nav>
</header>

<main class="page">
    <section class="page-heading">
        <div>
            <p class="eyebrow">Project tracker</p>
            <h1>Milestones, owners, dates, and status.</h1>
        </div>
    </section>

    <p class="flash success" th:if="${success}" th:text="${success}">Saved</p>
    <p class="flash error" th:if="${formError}" th:text="${formError}">Error</p>

    <section class="content-grid">
        <article class="panel">
            <div class="section-heading">
                <h2>Delivery Projects</h2>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>Project</th>
                        <th>Client</th>
                        <th>Consultant</th>
                        <th>Path</th>
                        <th>Deadline</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="project : ${projects}">
                        <td>
                            <strong th:text="${project.name}">Project</strong>
                            <span class="muted block" th:text="${project.description}">Description</span>
                        </td>
                        <td th:text="${project.client.name}">Client</td>
                        <td th:text="${project.assignedConsultant}">Consultant</td>
                        <td th:text="${project.migrationPath}">Path</td>
                        <td th:text="${project.deadline}">Date</td>
                        <td>
                            <form class="inline-form" th:action="@{/projects/{id}/status(id=${project.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <select name="status" aria-label="Project status">
                                    <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}" th:selected="${status == project.status}">PLANNED</option>
                                </select>
                                <button type="submit">Update</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </article>

        <aside class="panel narrow">
            <div class="section-heading">
                <h2>Create Project</h2>
            </div>
            <form class="stacked-form" th:action="@{/projects}" th:object="${projectForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label class="field">
                    <span>Client</span>
                    <select th:field="*{clientId}" required>
                        <option value="">Choose client</option>
                        <option th:each="client : ${clients}" th:value="${client.id}" th:text="${client.name}">Client</option>
                    </select>
                    <small class="field-error" th:if="${#fields.hasErrors('clientId')}" th:errors="*{clientId}">Client error</small>
                </label>
                <label class="field">
                    <span>Name</span>
                    <input th:field="*{name}" type="text" required>
                    <small class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</small>
                </label>
                <label class="field">
                    <span>Description</span>
                    <textarea th:field="*{description}" rows="4" required></textarea>
                    <small class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Description error</small>
                </label>
                <label class="field">
                    <span>Deadline</span>
                    <input th:field="*{deadline}" type="date" required>
                    <small class="field-error" th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}">Deadline error</small>
                </label>
                <label class="field">
                    <span>Priority</span>
                    <input th:field="*{priority}" type="number" min="1" max="5" required>
                    <small class="field-error" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}">Priority error</small>
                </label>
                <label class="field">
                    <span>Consultant</span>
                    <input th:field="*{assignedConsultant}" type="text" required>
                    <small class="field-error" th:if="${#fields.hasErrors('assignedConsultant')}" th:errors="*{assignedConsultant}">Consultant error</small>
                </label>
                <label class="field">
                    <span>Migration Path</span>
                    <select th:field="*{migrationPath}">
                        <option th:each="path : ${migrationPaths}" th:value="${path}" th:text="${path}">HYBRID_CLOUD</option>
                    </select>
                </label>
                <button type="submit">Create project</button>
            </form>
        </aside>
    </section>
</main>
</body>
</html>
