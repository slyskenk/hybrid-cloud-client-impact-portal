<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clients | Hybrid Cloud Client Impact Portal</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/}">Hybrid Cloud Client Impact Portal</a>
    <nav>
        <a th:href="@{/}">Dashboard</a>
        <a sec:authorize="hasAnyRole('ADMIN','CONSULTANT')" th:href="@{/clients}">Clients</a>
        <a sec:authorize="hasAnyRole('ADMIN','CONSULTANT')" th:href="@{/projects}">Projects</a>
        <a sec:authorize="hasAnyRole('ADMIN','CONSULTANT')" th:href="@{/analytics}">Analytics</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="link-button">Sign out</button>
        </form>
    </nav>
</header>

<main class="page">
    <section class="page-heading">
        <div>
            <p class="eyebrow">Client portfolio</p>
            <h1>Readiness, risk, and industry coverage.</h1>
        </div>
    </section>

    <p class="flash success" th:if="${success}" th:text="${success}">Saved</p>
    <p class="flash error" th:if="${formError}" th:text="${formError}">Error</p>

    <section class="content-grid">
        <article class="panel">
            <div class="section-heading">
                <h2>Clients</h2>
                <input id="client-search" type="search" placeholder="Search clients" aria-label="Search clients">
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Industry</th>
                        <th>Region</th>
                        <th>Contact</th>
                        <th>AI Score</th>
                        <th>Risk</th>
                    </tr>
                    </thead>
                    <tbody id="client-table">
                    <tr th:each="client : ${clients}">
                        <td th:text="${client.name}">Name</td>
                        <td th:text="${client.industry}">Industry</td>
                        <td th:text="${client.region}">Region</td>
                        <td th:text="${client.contactEmail}">Email</td>
                        <td><span class="score" th:text="${client.aiReadinessScore}">0</span></td>
                        <td><span class="status" th:text="${client.riskLevel}">MEDIUM</span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </article>

        <aside class="panel narrow">
            <div class="section-heading">
                <h2>Add Client</h2>
            </div>
            <form class="stacked-form" th:action="@{/clients}" th:object="${clientForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label class="field">
                    <span>Name</span>
                    <input th:field="*{name}" type="text" required>
                    <small class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</small>
                </label>
                <label class="field">
                    <span>Industry</span>
                    <input th:field="*{industry}" type="text" required>
                    <small class="field-error" th:if="${#fields.hasErrors('industry')}" th:errors="*{industry}">Industry error</small>
                </label>
                <label class="field">
                    <span>Region</span>
                    <input th:field="*{region}" type="text" required>
                    <small class="field-error" th:if="${#fields.hasErrors('region')}" th:errors="*{region}">Region error</small>
                </label>
                <label class="field">
                    <span>Contact Email</span>
                    <input th:field="*{contactEmail}" type="email" required>
                    <small class="field-error" th:if="${#fields.hasErrors('contactEmail')}" th:errors="*{contactEmail}">Email error</small>
                </label>
                <label class="field">
                    <span>AI Readiness Score</span>
                    <input th:field="*{aiReadinessScore}" type="number" min="0" max="100" required>
                    <small class="field-error" th:if="${#fields.hasErrors('aiReadinessScore')}" th:errors="*{aiReadinessScore}">Score error</small>
                </label>
                <label class="field">
                    <span>Risk Level</span>
                    <select th:field="*{riskLevel}">
                        <option th:each="risk : ${riskLevels}" th:value="${risk}" th:text="${risk}">MEDIUM</option>
                    </select>
                </label>
                <button type="submit">Create client</button>
            </form>

            <div class="divider"></div>
            <div class="section-heading compact">
                <h2>Industry Map</h2>
            </div>
            <div class="industry-list">
                <div class="industry-row" th:each="entry : ${industries}">
                    <span th:text="${entry.key}">Industry</span>
                    <strong th:text="${entry.value.size()}">0</strong>
                </div>
            </div>
        </aside>
    </section>
</main>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
