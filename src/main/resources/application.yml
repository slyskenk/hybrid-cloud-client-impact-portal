spring:
  application:
    name: hybrid-cloud-client-impact-portal
  datasource:
    url: jdbc:h2:mem:impactportal
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    com.ibmjob.hybridportal: INFO
    org.springframework.security: WARN
